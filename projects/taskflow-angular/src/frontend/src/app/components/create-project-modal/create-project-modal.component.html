@if (visible) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    (click)="closed.emit()"
    role="dialog"
    aria-modal="true"
  >
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

    <!-- Modal panel -->
    <div
      class="relative z-10 bg-white rounded-2xl shadow-xl w-full max-w-md p-6"
      (click)="$event.stopPropagation()"
    >
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-display font-semibold text-lg text-slate-800">New Project</h2>
        <button
          type="button"
          (click)="closed.emit()"
          class="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="flex flex-col gap-4">
          <!-- Name field -->
          <div>
            <label for="project-name" class="block text-sm font-medium text-slate-700 mb-1.5">
              Project Name <span class="text-danger">*</span>
            </label>
            <input
              id="project-name"
              type="text"
              formControlName="name"
              class="input"
              placeholder="Enter project name"
              autocomplete="off"
            />
            @if (nameControl.touched && nameControl.hasError('required')) {
              <p class="mt-1 text-xs text-danger">Project name is required.</p>
            }
            @if (nameControl.touched && nameControl.hasError('maxlength')) {
              <p class="mt-1 text-xs text-danger">Project name must be 200 characters or fewer.</p>
            }
          </div>

          <!-- Description field -->
          <div>
            <label for="project-description" class="block text-sm font-medium text-slate-700 mb-1.5">
              Description <span class="text-slate-400 font-normal">(optional)</span>
            </label>
            <textarea
              id="project-description"
              formControlName="description"
              class="input resize-none"
              rows="3"
              placeholder="Describe what this project is about"
            ></textarea>
          </div>
        </div>

        <div class="flex justify-end gap-3 mt-6">
          <button type="button" (click)="closed.emit()" class="btn-ghost">Cancel</button>
          <button type="submit" class="btn-primary" [disabled]="form.invalid">
            Create Project
          </button>
        </div>
      </form>
    </div>
  </div>
}
