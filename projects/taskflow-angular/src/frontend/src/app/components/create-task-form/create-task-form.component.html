<form [formGroup]="form" (ngSubmit)="submit()" novalidate class="bg-white rounded-xl border border-slate-200 p-4">
  <div class="flex items-start gap-3">
    <!-- Title input -->
    <div class="flex-1">
      <input
        type="text"
        formControlName="title"
        class="input"
        placeholder="New task title…"
        autocomplete="off"
      />
      @if (titleControl.touched && titleControl.hasError('required')) {
        <p class="mt-1 text-xs text-danger">Task title is required.</p>
      }
      @if (titleControl.touched && titleControl.hasError('maxlength')) {
        <p class="mt-1 text-xs text-danger">Title must be 500 characters or fewer.</p>
      }
    </div>

    <!-- Priority select -->
    <select
      formControlName="priority"
      class="input w-auto min-w-[110px]"
    >
      <option value="LOW">Low</option>
      <option value="MEDIUM">Medium</option>
      <option value="HIGH">High</option>
    </select>

    <!-- Submit button -->
    <button
      type="submit"
      class="btn-primary shrink-0"
      [disabled]="form.invalid"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
      </svg>
      Add Task
    </button>
  </div>
</form>
