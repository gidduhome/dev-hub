spring:
  application:
    name: taskflow-angular
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5434/taskflow}
    username: ${POSTGRES_USER:taskflow}
    password: ${POSTGRES_PASSWORD:taskflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${DEBUG:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /api/v1/openapi.json
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics

cors:
  origins: ${CORS_ORIGINS:http://localhost:4200}
